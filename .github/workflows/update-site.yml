name: Update Website

on:
  repository_dispatch:
    types: [google-docs-update]
  # Manual "Run workflow" button. Uses the DRIVE_FOLDER_ID secret for the
  # folder, so the same pipeline can be run from the Actions tab without the
  # Google-Docs button (recovery/testing) and without exposing the ID.
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install googleapis fs-extra

      - name: Download source JSON files from Drive
        run: node .github/scripts/download-files.cjs
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          FOLDER_ID: ${{ github.event.client_payload.folder_id || secrets.DRIVE_FOLDER_ID }}

      - name: Transform and merge JSON to final data.json
        run: node conversion-script.cjs

      - name: Copy data to public/data for Vite build
        run: |
          mkdir -p public/data
          cp data/guide_data.json public/data/guide_data.json
          cp data/guide_data_landlubber.json public/data/guide_data_landlubber.json 2>/dev/null || true

      - name: Commit and push
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add data/guide_data.json public/data/guide_data.json public/data/guide_data_landlubber.json
          git commit -m "Update website data" || echo "No changes to commit"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin HEAD:main
